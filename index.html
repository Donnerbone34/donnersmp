<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonnerSMP | Official Server</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #00ffcc;
            --background: #050505;
            --surface: #121212;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --status-green: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 8%;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-link:hover {
            transform: scale(1.08);
        }

        .nav-logo-img {
            height: 48px;
            width: auto;
            display: block;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            gap: 15px;
            align-items: center;
            border-left: 1px solid #222;
            padding-left: 20px;
        }

        .social-icon {
            height: 22px;
            width: auto;
            transition: 0.3s;
            opacity: 0.6;
            filter: grayscale(1);
        }

        .social-icon:hover {
            opacity: 1;
            filter: grayscale(0);
            transform: translateY(-2px);
        }

        .nav-links {
            display: flex;
            gap: 35px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .badge {
            font-size: 0.65rem;
            background: #1a1a1a;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            color: #444;
            border: 1px solid #222;
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            padding: 140px 20px 60px 20px;
        }

        /* Server Status Pulse */
        .status-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(46, 213, 115, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(46, 213, 115, 0.1);
        }

        .status-dot {
            height: 8px;
            width: 8px;
            background-color: var(--status-green);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--status-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }

        .status-text {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--status-green);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero h1 {
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 0%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--text-dim);
            max-width: 550px;
            margin-bottom: 50px;
        }

        /* Join Cards */
        .join-options {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1000px;
        }

        .ip-box {
            background: var(--surface);
            padding: 25px 35px;
            border-radius: 20px;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-align: left;
            min-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .ip-box:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: #181818;
        }

        .ip-box.bedrock:hover {
            border-color: var(--secondary);
        }

        .platform-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 12px;
        }

        .ip-text {
            display: block;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 4px;
        }

        .bedrock .ip-text {
            color: var(--secondary);
        }

        .port-text {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #555;
        }

        .hint-text {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #333;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .nav-links { display: none; }
            .social-links { border-left: none; padding-left: 0; }
            .join-options { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-section">
            <a href="/" class="logo-link">
                <img src="logo.png" alt="DonnerSMP" class="nav-logo-img">
            </a>

            <div class="social-links">
                <a href="https://www.youtube.com/@donnerbone" target="_blank">
                    <img src="youtube.png" alt="YouTube" class="social-icon">
                </a>
                <a href="https://discord.gg/bJ3BghxF" target="_blank">
                    <img src="discord.png" alt="Discord" class="social-icon">
                </a>
            </div>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Shop <span class="badge">SOON</span></a>
            <a href="#">Stats <span class="badge">SOON</span></a>
        </div>
    </nav>

    <section class="hero">
        <div class="status-container">
            <div class="status-dot"></div>
            <span class="status-text">Server Online</span>
        </div>

        <h1>DONNER<span>SMP</span></h1>
        <p>A premier Minecraft survival experience. Join our cross-play community today.</p>
        
        <div class="join-options">
            <div class="ip-box" onclick="copy('donnersmp.net', this, '#ff4757')">
                <span class="platform-label">Minecraft Java</span>
                <span class="ip-text">donnersmp.net</span>
                <span class="port-text">Port: Default</span>
            </div>

            <div class="ip-box bedrock" onclick="copy('28672', this, '#00ffcc')">
                <span class="platform-label">Minecraft Bedrock</span>
                <span class="ip-text">donnersmp.net</span>
                <span class="port-text">Port: <span style="color: #888;">28672</span></span>
            </div>
        </div>

        <p class="hint-text">Click cards to copy connection info</p>
    </section>

    <script>
        function copy(text, element, color) {
            navigator.clipboard.writeText(text);
            const original = element.innerHTML;
            element.style.borderColor = color;
            element.innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; padding: 20px 0;">
                                    <span style="color:${color}; font-weight:900; font-size:1.4rem; letter-spacing:2px;">COPIED!</span>
                                 </div>`;
            setTimeout(() => {
                element.innerHTML = original;
                element.style.borderColor = "#1a1a1a";
            }, 1500);
        }
    </script>

</body>
</html>
