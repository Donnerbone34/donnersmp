<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="Join DonnerSMP! A 1.21.11 Java and Bedrock crossplay survival Minecraft server.">
    <meta name="keywords" content="Minecraft, DonnerSMP, Java, Bedrock, SMP, 1.21.11, Minecraft Server">
    <meta name="robots" content="index, follow">
    
    <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" />

    <title>DonnerSMP | 1.21.11 Official</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #ff4757; --secondary: #00ffcc; --bg: #0a0a0a; --surface: #161616; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        nav { display: flex; justify-content: space-between; padding: 15px 10%; background: rgba(0,0,0,0.9); border-bottom: 1px solid #333; position: fixed; width: 100%; z-index: 1000; }
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?q=80&w=1920'); background-size: cover; }
        .status-card { background: var(--surface); padding: 40px; border-radius: 24px; border: 1px solid #333; width: 90%; max-width: 600px; margin: -60px auto 40px; text-align: center; position: relative; z-index: 5; }
        .pulse { width: 12px; height: 12px; border-radius: 50%; background: #2ed573; display: inline-block; margin-right: 10px; box-shadow: 0 0 15px #2ed573; }
        .pulse.offline { background: #ff4757; box-shadow: 0 0 15px #ff4757; }
        .stat-box { background: #222; padding: 15px; border-radius: 12px; margin: 10px 0; }
        .player-chip { background: var(--primary); color: white; padding: 4px 10px; border-radius: 15px; font-size: 0.75rem; margin: 3px; display: inline-block; font-weight: 700; }
    </style>
</head>
<body>

<nav>
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="logo.png" style="height: 35px;" alt="DonnerSMP Logo">
        <span style="font-weight:900; letter-spacing:1px;">DONNER<span>SMP</span></span>
    </div>
</nav>

<section class="hero">
    <h1 style="font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900;">1.21.11 <span>LIVE</span></h1>
    <p style="color: #888; margin-top: 10px;">Java and Bedrock: play.donnersmp.net | Bedrock Port: 28672</p>
</section>

<div class="status-card">
    <div style="margin-bottom: 20px;">
        <div id="status-dot" class="pulse"></div>
        <h2 id="status-text" style="display: inline; letter-spacing: 1px;">CONNECTING...</h2>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="stat-box">
            <p style="font-size: 0.6rem; color: #666; text-transform: uppercase;">Capacity</p>
            <h3 id="player-count">0 / 50</h3>
        </div>
        <div class="stat-box">
            <p style="font-size: 0.6rem; color: #666; text-transform: uppercase;">Version</p>
            <h3 id="version-text">1.21.11</h3>
        </div>
    </div>

    <div style="text-align: left; margin-top: 20px;">
        <p style="font-size: 0.6rem; color: #666; text-transform: uppercase; margin-bottom: 10px;">Active Players</p>
        <div id="player-list" style="min-height: 30px;"></div>
    </div>
</div>

<script>
    async function updateStatus() {
        const dot = document.getElementById('status-dot');
        const text = document.getElementById('status-text');
        const pCount = document.getElementById('player-count');
        const pList = document.getElementById('player-list');

        try {
            const res = await fetch('https://api.mcstatus.io/v2/status/java/168.119.78.155:28672');
            const data = await res.json();

            if (data.online) {
                dot.classList.remove('offline');
                text.innerText = "SERVER ONLINE";
                text.style.color = "#2ed573";
                pCount.innerText = `${data.players.online} / 50`;
                
                if (data.players.list && data.players.list.length > 0) {
                    pList.innerHTML = data.players.list.map(p => `<span class="player-chip">${p.name_clean}</span>`).join('');
                } else {
                    pList.innerHTML = "<p style='color:#444; font-size:0.8rem;'>No players currently online.</p>";
                }
            } else {
                dot.classList.add('offline');
                text.innerText = "SERVER OFFLINE";
                text.style.color = "#ff4757";
                pCount.innerText = "0 / 50";
                pList.innerHTML = "";
            }
        } catch (e) {
            text.innerText = "API ERROR";
        }
    }

    updateStatus();
    setInterval(updateStatus, 300000);
</script>

</body>
</html>
