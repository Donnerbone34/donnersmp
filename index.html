<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonnerSMP | Official Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --background: #0f0f0f;
            --surface: #1a1a1a;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10%;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: var(--primary);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .coming-soon {
            font-size: 0.7rem;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
            color: var(--text-dim);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
            margin-bottom: 30px;
        }

        .ip-box {
            background: var(--surface);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid #444;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ip-box:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2);
        }

        .ip-text {
            font-weight: 700;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">DONNER<span>SMP</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Shop <span class="coming-soon">SOON</span></a>
            <a href="#">Stats <span class="coming-soon">SOON</span></a>
        </div>
    </nav>

    <section class="hero">
        <h1>DONNER<span>SMP</span></h1>
        <p>The ultimate survival experience. Join a community of builders, explorers, and warriors.</p>
        
        <div class="ip-box" onclick="copyIP()">
            <span>Server IP:</span>
            <span class="ip-text" id="serverIP">play.donnersmp.net</span>
        </div>
        <p style="margin-top: 15px; font-size: 0.8rem; opacity: 0.6;">Click the IP to copy</p>
    </section>

    <script>
        function copyIP() {
            const ip = document.getElementById('serverIP').innerText;
            navigator.clipboard.writeText(ip);
            
            // Visual feedback
            const box = document.querySelector('.ip-box');
            const originalText = box.innerHTML;
            box.innerHTML = '<span style="color: #2ed573;">IP Copied!</span>';
            setTimeout(() => {
                box.innerHTML = originalText;
            }, 2000);
        }
    </script>

</body>
</html>
