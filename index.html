<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonnerSMP | Official Server</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #00ffcc;
            --background: #0f0f0f;
            --surface: #1a1a1a;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --status-green: #2ed573;
            --status-red: #ff4757;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10%;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .logo-link:hover {
            transform: scale(1.05);
        }

        .nav-logo-img {
            height: 45px;
            width: auto;
            display: block;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            gap: 15px;
            align-items: center;
            border-left: 1px solid #333;
            padding-left: 20px;
        }

        .social-icon {
            height: 24px;
            width: auto;
            transition: 0.3s;
            opacity: 0.7;
        }

        .social-icon:hover {
            opacity: 1;
            transform: translateY(-2px);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .coming-soon {
            font-size: 0.7rem;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 5px;
            vertical-align: middle;
            color: var(--text-dim);
        }

        /* Hero Section */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
            padding: 120px 20px 40px 20px;
        }

        /* PULSE STATUS SYSTEM */
        .status-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 100px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .pulse-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--status-green);
            box-shadow: 0 0 0 rgba(46, 213, 115, 0.4);
            animation: pulse-green 2s infinite;
        }

        .pulse-dot.offline {
            background: var(--status-red);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(46, 213, 115, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 71, 87, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        #status-text {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--status-green);
        }

        #status-text.offline { color: var(--status-red); }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 5rem);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .join-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
        }

        .ip-box {
            background: var(--surface);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid #333;
            cursor: pointer;
            transition: 0.3s ease;
            text-align: left;
            min-width: 280px;
        }

        .ip-box:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.15);
        }

        .ip-box.bedrock:hover {
            border-color: var(--secondary);
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.15);
        }

        .platform-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .ip-text {
            display: block;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary);
        }

        .bedrock .ip-text {
            color: var(--secondary);
        }

        .port-text {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 5px;
            color: #888;
        }

        .copy-hint {
            margin-top: 20px;
            font-size: 0.8rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; }
            .nav-links { display: none; }
            .join-options { flex-direction: column; align-items: center; }
            .social-links { border-left: none; padding-left: 10px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand-section">
            <a href="/" class="logo-link">
                <img src="logo.png" alt="DonnerSMP Logo" class="nav-logo-img">
            </a>

            <div class="social-links">
                <a href="https://www.youtube.com/@donnerbone" target="_blank">
                    <img src="youtube.png" alt="YouTube" class="social-icon">
                </a>
                <a href="https://discord.gg/bJ3BghxF" target="_blank">
                    <img src="discord.png" alt="Discord" class="social-icon">
                </a>
            </div>
        </div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Shop <span class="coming-soon">SOON</span></a>
            <a href="#">Stats <span class="coming-soon">SOON</span></a>
        </div>
    </nav>

    <section class="hero">
        <div class="status-wrapper">
            <div id="status-dot" class="pulse-dot"></div>
            <div id="status-text">Checking Status...</div>
        </div>

        <h1>DONNER<span>SMP</span></h1>
        <p>The ultimate survival experience for NZ & Australian players. Now with full cross-play support.</p>
        
        <div class="join-options">
            <div class="ip-box" onclick="copyText('donnersmp.net', this)">
                <span class="platform-label">Minecraft Java</span>
                <span class="ip-text">donnersmp.net</span>
                <span class="port-text">Port: Default</span>
            </div>

            <div class="ip-box bedrock" onclick="copyText('28672', this)">
                <span class="platform-label">Minecraft Bedrock</span>
                <span class="ip-text">donnersmp.net</span>
                <span class="port-text">Port: <span style="color:white">28672</span></span>
            </div>
        </div>

        <p class="copy-hint">CLICK EITHER BOX TO COPY INFO</p>
    </section>

    <script>
        // STATUS API CHECK
        async function updateStatus() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            try {
                // Using mcapi.us (free Minecraft status API)
                const response = await fetch('https://mcapi.us/server/status?ip=donnersmp.net');
                const data = await response.json();
                
                if (data.online) {
                    dot.classList.remove('offline');
                    text.classList.remove('offline');
                    text.innerText = `Online: ${data.players.now} Players`;
                } else {
                    dot.classList.add('offline');
                    text.classList.add('offline');
                    text.innerText = "Server Offline";
                }
            } catch (error) {
                text.innerText = "Status Unavailable";
            }
        }

        // Run status check on load
        updateStatus();
        // Refresh every 60 seconds
        setInterval(updateStatus, 60000);

        function copyText(text, element) {
            navigator.clipboard.writeText(text);
            const originalContent = element.innerHTML;
            const isBedrock = element.classList.contains('bedrock');
            const feedbackColor = isBedrock ? '#00ffcc' : '#ff4757';
            
            element.innerHTML = `<div style="height: 100%; display: flex; align-items: center; justify-content: center;">
                                    <span style="color: ${feedbackColor}; font-weight: 900; font-size: 1.2rem;">COPIED!</span>
                                 </div>`;
            
            setTimeout(() => {
                element.innerHTML = originalContent;
            }, 1500);
        }
    </script>

</body>
</html>
