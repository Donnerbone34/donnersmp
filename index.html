<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DonnerSMP</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* Animated Background */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
background:radial-gradient(circle at center,#38bdf820,transparent 60%);
animation:pulse 6s infinite alternate;
}

@keyframes pulse{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 60px;
backdrop-filter:blur(15px);
position:fixed;
width:100%;
z-index:10;
}

.logo{
font-size:24px;
font-weight:700;
}

.nav-links button{
background:none;
border:none;
color:white;
margin-left:30px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.nav-links button:hover{
color:#38bdf8;
transform:translateY(-2px);
}

/* Sections */
.section{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
opacity:0;
transform:translateY(30px);
transition:.6s ease;
}

.section.active{
display:flex;
opacity:1;
transform:translateY(0);
}

/* Title */
.hero-title{
font-size:80px;
font-weight:700;
background:linear-gradient(90deg,#38bdf8,#a78bfa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:30px;
}

/* IP Box */
.copy-box{
display:flex;
gap:15px;
align-items:center;
background:rgba(255,255,255,0.05);
padding:18px 30px;
border-radius:18px;
backdrop-filter:blur(20px);
}

.copy-btn{
padding:12px 22px;
border:none;
border-radius:12px;
background:#38bdf8;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.copy-btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(56,189,248,.5);
}

/* Coming Soon Text */
.coming{
font-size:60px;
opacity:.6;
}

/* Floating particles */
.particle{
position:absolute;
width:6px;
height:6px;
background:white;
opacity:.2;
border-radius:50%;
animation:float 10s infinite;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-40px);}
}

</style>
</head>

<body>

<div class="bg"></div>

<script>
/* Create floating particles */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.top=Math.random()*100+"vh";
p.style.animationDelay=Math.random()*5+"s";
document.body.appendChild(p);
}
</script>

<nav>
<div class="logo">DonnerSMP</div>

<div class="nav-links">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('stats')">Stats</button>
</div>
</nav>

<!-- HOME -->
<div id="home" class="section active">
<h1 class="hero-title">donnersmp.net</h1>

<div class="copy-box">
<span id="ip">donnersmp.net</span>
<button class="copy-btn" onclick="copyIP()">Copy IP</button>
</div>
</div>

<!-- SHOP -->
<div id="shop" class="section">
<h1 class="coming">Shop Coming Soon</h1>
</div>

<!-- STATS -->
<div id="stats" class="section">
<h1 class="coming">Stats Coming Soon</h1>
</div>

<script>

function showPage(page){
document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(page).classList.add("active");
}

function copyIP(){
navigator.clipboard.writeText("donnersmp.net");

let btn=document.querySelector(".copy-btn");
btn.innerText="Copied!";

setTimeout(()=>{
btn.innerText="Copy IP";
},2000);
}

</script>

</body>
</html>
