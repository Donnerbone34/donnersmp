<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonnerSMP | Official</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4757; --secondary: #00ffcc; --bg: #0f0f0f; --card: #1a1a1a; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        
        nav { display: flex; justify-content: space-between; padding: 15px 10%; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 1000; border-bottom: 1px solid #333; }
        .nav-links a { color: white; text-decoration: none; margin-left: 20px; font-weight: 700; font-size: 0.9rem; }
        
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1627398242454-45a1465c2479?q=80&w=1920'); background-size: cover; padding: 20px; }
        .hero h1 { font-size: clamp(3rem, 8vw, 5rem); font-weight: 900; }
        
        .status-container { padding: 100px 10%; background: #0a0a0a; display: flex; flex-direction: column; align-items: center; }
        .status-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 700px; text-align: center; }
        
        .pulse { width: 15px; height: 15px; border-radius: 50%; background: #2ed573; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #2ed573; }
        .pulse.offline { background: #ff4757; box-shadow: 0 0 10px #ff4757; }

        .player-tag { background: #333; padding: 5px 12px; border-radius: 5px; font-size: 0.8rem; margin: 4px; display: inline-block; }
        
        .copy-btn { background: var(--card); border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; margin: 10px; width: 250px; }
        .copy-btn:hover { border-color: var(--primary); transform: translateY(-3px); }
    </style>
</head>
<body>

<nav>
    <img src="logo.png" style="height: 40px;">
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#status">Server Status</a>
        <a href="https://discord.gg/bJ3BghxF">Discord</a>
    </div>
</nav>

<section class="hero">
    <h1>DONNER<span>SMP</span></h1>
    <p>Join the future of Survival Multiplayer</p>
    <div style="display: flex; flex-wrap: wrap; justify-content: center;">
        <button class="copy-btn" onclick="copy('donnersmp.net')"><b>JAVA IP:</b> donnersmp.net</button>
        <button class="copy-btn" onclick="copy('28672')"><b>BEDROCK PORT:</b> 28672</button>
    </div>
</section>

<section id="status" class="status-container">
    <div class="status-card">
        <div id="status-dot" class="pulse"></div>
        <h2 id="status-text" style="display: inline;">Checking Server...</h2>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0;">
            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 10px;">
                <p style="color: #888; font-size: 0.8rem;">PLAYERS</p>
                <h3 id="player-count">0 / 0</h3>
            </div>
            <div style="background: rgba(255,255,255,0.03); padding: 20px; border-radius: 10px;">
                <p style="color: #888; font-size: 0.8rem;">VERSION</p>
                <h3 id="version-text">Loading...</h3>
            </div>
        </div>

        <p style="text-align: left; color: #888; font-size: 0.8rem; margin-bottom: 10px;">ONLINE PLAYERS:</p>
        <div id="player-list" style="text-align: left; min-height: 50px;"></div>
    </div>
</section>

<script>
    async function updateStatus() {
        try {
            const res = await fetch('https://api.mcstatus.io/v2/status/java/168.119.78.155:28672');
            const data = await res.json();
            
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const pCount = document.getElementById('player-count');
            const vText = document.getElementById('version-text');
            const pList = document.getElementById('player-list');

            if (data.online) {
                dot.classList.remove('offline');
                text.innerText = "SERVER ONLINE";
                pCount.innerText = `${data.players.online} / ${data.players.max}`;
                vText.innerText = data.version.name_clean;
                
                if (data.players.list && data.players.list.length > 0) {
                    pList.innerHTML = data.players.list.map(p => `<span class="player-tag">${p.name_clean}</span>`).join('');
                } else {
                    pList.innerHTML = "<span style='color:#444'>No players online.</span>";
                }
            } else {
                dot.classList.add('offline');
                text.innerText = "SERVER OFFLINE";
                pCount.innerText = "0 / 0";
                vText.innerText = "N/A";
                pList.innerHTML = "";
            }
        } catch (e) {
            console.log("Status error");
        }
    }

    function copy(txt) {
        navigator.clipboard.writeText(txt);
        alert("Copied: " + txt);
    }

    updateStatus();
    setInterval(updateStatus, 300000); // 5 minutes
</script>

</body>
</html
